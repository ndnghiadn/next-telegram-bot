version: '3.8'

services:
  next-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    restart: unless-stopped
    volumes:
      - ./.env.local:/app/.env.local:ro

  telegram-bot:
    build: .
    command: npm run bot
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    restart: unless-stopped
    volumes:
      - ./.env.local:/app/.env.local:ro
    depends_on:
      - next-app
